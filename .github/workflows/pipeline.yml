name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted  

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure Docker for CI (Bypass Keychain)
        run: |
          # Remove any existing config
          rm -rf ~/.docker
          mkdir -p ~/.docker
          
          # Create config with NO credential helper
          cat > ~/.docker/config.json << EOF
          {
            "auths": {},
            "credsStore": "",
            "credHelpers": {}
          }
          EOF
          echo "Docker configured for CI environment"

      - name: Docker Login
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "$DOCKER_PASS" | docker login -u "$DOCKER_USER" --password-stdin
          echo "✅ Docker login successful"

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cloud-native-image:${{ github.run_number }} .
          echo "✅ Docker image built: ${{ github.run_number }}"

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/cloud-native-image:${{ github.run_number }}
          echo "✅ Docker image pushed: ${{ github.run_number }}"

      - name: Check Deployment Status
        id: check-deploy
        run: |
          if kubectl get deployment cloud-native-app &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Kubernetes
        if: steps.check-deploy.outputs.exists == 'true'
        run: |
          kubectl set image deployment/cloud-native-app \
            cloud-native-app=${{ secrets.DOCKER_USERNAME }}/cloud-native-image:${{ github.run_number }}
          kubectl rollout status deployment/cloud-native-app
          echo "✅ Deployment updated and rolled out"

      - name: Initial Deployment (if needed)
        if: steps.check-deploy.outputs.exists == 'false'
        run: |
          echo "⚠️ Deployment not found - you may need to run initial helm install"
          echo "Run: helm install cloud-native-release ./cloud-native-chart"